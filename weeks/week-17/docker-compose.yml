version: "3.9"

services:
  shipments-svc-s07:
    build:
      context: ./shipments-service
    container_name: shipments-svc-s07
    ports:
      - "8230:8230"
    depends_on:
      tracking-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8230/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - final-net

  tracking-service:
    build:
      context: ./tracking-service
    container_name: tracking-service
    ports:
      - "8231:8231"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8231/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - final-net

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    ports:
      - "8232:8232"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8232/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - final-net

  gateway:
    image: nginx:alpine
    container_name: shipments-gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      shipments-svc-s07:
        condition: service_healthy
    networks:
      - final-net

networks:
  final-net:
    driver: bridge
