version: '3.9'

services:
  sessions-svc-s07:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: sessions-svc-s07
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8227:8227"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8227/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      sessions-svc-s07:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
