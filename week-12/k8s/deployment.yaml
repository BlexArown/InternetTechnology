apiVersion: apps/v1
kind: Deployment
metadata:
  name: likes-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: likes-app
  template:
    metadata:
      labels:
        app: likes-app
    spec:
      containers:
        - name: likes-container
          image: likes-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8274
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8274
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8274
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
